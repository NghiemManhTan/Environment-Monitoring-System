<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg"/>
<meta name="theme-color" content="#0d1626"/>
<title>Login — EnvMonitor</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--p:#6366f1;--s:#00d4ff;--bg:#030712;--card:#0d1117;--b:#1f2937;--t:#f1f5f9;--m:#64748b;--grad:linear-gradient(135deg,#6366f1,#00d4ff)}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--t);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;position:relative;overflow:hidden}

/* Background */
.bg{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse 70% 60% at 30% 20%,#6366f122,transparent 60%),radial-gradient(ellipse 50% 50% at 75% 75%,#00d4ff15,transparent 55%)}
.bg-grid{position:fixed;inset:0;background-image:linear-gradient(rgba(99,102,241,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(99,102,241,.04) 1px,transparent 1px);background-size:56px 56px}

/* Card */
.card{position:relative;z-index:1;background:#0d111acc;backdrop-filter:blur(20px);border:1px solid #ffffff12;border-radius:24px;padding:40px;width:100%;max-width:420px;box-shadow:0 32px 64px #00000080}
.card-top{text-align:center;margin-bottom:32px}
.logo{font-size:1.1rem;font-weight:900;letter-spacing:1.5px;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:20px;display:block}
.card h1{font-size:1.6rem;font-weight:800;margin-bottom:6px}
.card-sub{font-size:.88rem;color:var(--m)}

/* Tabs */
.tabs{display:flex;background:#ffffff08;border:1px solid #ffffff10;border-radius:12px;padding:4px;margin-bottom:24px;gap:4px}
.tab{flex:1;padding:8px;border:none;border-radius:9px;font-size:.85rem;font-weight:600;cursor:pointer;transition:all .2s;background:transparent;color:var(--m)}
.tab.active{background:#6366f1;color:#fff}

/* Form */
.field{margin-bottom:16px}
.field label{display:block;font-size:.82rem;font-weight:600;color:var(--m);margin-bottom:7px;letter-spacing:.3px}
.field-wrap{position:relative}
.field input{width:100%;padding:12px 16px;background:#ffffff08;border:1px solid #ffffff12;border-radius:12px;color:var(--t);font-size:.93rem;font-family:'Inter',sans-serif;outline:none;transition:border-color .2s,box-shadow .2s}
.field input:focus{border-color:#6366f160;box-shadow:0 0 0 3px #6366f120}
.field input::placeholder{color:var(--m)}
.eye{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--m);cursor:pointer;font-size:1.1rem;padding:2px}

/* Options */
.opts{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px}
.check{display:flex;align-items:center;gap:8px;font-size:.82rem;color:var(--m);cursor:pointer}
.check input{width:15px;height:15px;accent-color:var(--p);cursor:pointer}
.forgot{font-size:.82rem;color:#818cf8;font-weight:500;text-decoration:none;transition:color .2s}
.forgot:hover{color:var(--s)}

/* Buttons */
.btn-login{width:100%;padding:13px;background:var(--grad);color:#fff;border:none;border-radius:12px;font-size:.95rem;font-weight:700;cursor:pointer;transition:opacity .2s,transform .1s;margin-bottom:20px;font-family:'Inter',sans-serif}
.btn-login:hover{opacity:.88}.btn-login:active{transform:scale(.98)}
.btn-login:disabled{opacity:.5;cursor:not-allowed}

/* Divider */
.div{display:flex;align-items:center;gap:12px;margin-bottom:18px}
.div-line{flex:1;height:1px;background:#ffffff10}
.div span{font-size:.78rem;color:var(--m);white-space:nowrap}

/* Social */
.socials{display:flex;flex-direction:column;gap:10px;margin-bottom:24px}
.s-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:11px;border:1px solid #ffffff12;border-radius:12px;background:#ffffff06;color:var(--t);font-size:.88rem;font-weight:600;cursor:pointer;transition:background .2s,border-color .2s;font-family:'Inter',sans-serif}
.s-btn:hover{background:#ffffff10;border-color:#ffffff20}
.s-icon{width:20px;height:20px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:.9rem}

/* Footer */
.card-foot{text-align:center;font-size:.83rem;color:var(--m)}
.card-foot a{color:#818cf8;font-weight:600;text-decoration:none}
.card-foot a:hover{color:var(--s)}

/* Error */
.error{background:#ff2d5518;border:1px solid #ff2d5545;color:#ff7090;border-radius:10px;padding:10px 14px;font-size:.83rem;margin-bottom:16px;display:none}

/* Demo hint */
.demo-hint{background:#6366f112;border:1px solid #6366f130;border-radius:10px;padding:10px 14px;font-size:.78rem;color:#a5b4fc;margin-bottom:20px;text-align:center}
.demo-hint strong{color:#c7d2fe}

/* Back link */
.back{position:fixed;top:20px;left:24px;z-index:10;display:flex;align-items:center;gap:6px;color:var(--m);font-size:.85rem;text-decoration:none;transition:color .2s}
.back:hover{color:var(--t)}
</style>
</head>
<body>
<div class="bg"></div><div class="bg-grid"></div>
<a href="/" class="back">← Home</a>

<div class="card">
  <div class="card-top">
    <span class="logo">◈ ENVMONITOR</span>
    <h1>Welcome back</h1>
    <p class="card-sub">Sign in to view your environment monitoring dashboard</p>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('email',this)">📧 Email</button>
    <button class="tab" onclick="switchTab('phone',this)">📱 Phone Number</button>
  </div>

  <div class="demo-hint">Demo: enter <strong>any email/password</strong> to sign in</div>
  <div class="error" id="error"></div>

  <!-- Email form -->
  <div id="form-email">
    <div class="field">
      <label>EMAIL ADDRESS</label>
      <div class="field-wrap"><input type="email" id="email" placeholder="name@example.com" autocomplete="email"/></div>
    </div>
    <div class="field">
      <label>PASSWORD</label>
      <div class="field-wrap">
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"/>
        <button class="eye" onclick="togglePw()" id="eye-btn">👁</button>
      </div>
    </div>
  </div>

  <!-- Phone form -->
  <div id="form-phone" style="display:none">
    <div class="field">
      <label>PHONE NUMBER</label>
      <div class="field-wrap"><input type="tel" id="phone" placeholder="(555) 123-4567"/></div>
    </div>
    <div class="field">
      <label>OTP CODE</label>
      <div class="field-wrap" style="display:flex;gap:10px">
        <input type="text" id="otp" placeholder="- - - - - -" style="flex:1;letter-spacing:8px;text-align:center"/>
        <button onclick="fakeOtp()" style="padding:0 16px;background:#6366f1;color:#fff;border:none;border-radius:12px;font-size:.82rem;font-weight:600;cursor:pointer;white-space:nowrap">Send OTP</button>
      </div>
    </div>
  </div>

  <div class="opts">
    <label class="check"><input type="checkbox" checked/> Remember me</label>
    <a href="#" class="forgot">Forgot password?</a>
  </div>

  <button class="btn-login" id="login-btn" onclick="doLogin()">Login</button>

  <div class="div"><div class="div-line"></div><span>Or sign in with</span><div class="div-line"></div></div>

  <div class="socials">
    <button class="s-btn" onclick="socialLogin('facebook')">
      <div class="s-icon" style="background:#1877f2;color:#fff;font-weight:700">f</div>
      Continue with Facebook
    </button>
    <button class="s-btn" onclick="socialLogin('google')">
      <div class="s-icon">
        <svg width="18" height="18" viewBox="0 0 18 18"><path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/><path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z" fill="#34A853"/><path d="M3.964 10.71c-.18-.54-.282-1.117-.282-1.71s.102-1.17.282-1.71V4.958H.957C.347 6.173 0 7.548 0 9s.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/><path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z" fill="#EA4335"/></svg>
      </div>
      Continue with Google
    </button>
  </div>

  <div class="card-foot">Don't have an account? <a href="#">Sign up now</a></div>
</div>

<script>
if (localStorage.getItem('em_user')) window.location.href = '/dashboard';

let tab = 'email';
function switchTab(t, el) {
  tab = t;
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('form-email').style.display = t==='email' ? 'block' : 'none';
  document.getElementById('form-phone').style.display = t==='phone' ? 'block' : 'none';
}

function togglePw() {
  const inp = document.getElementById('password');
  inp.type = inp.type === 'password' ? 'text' : 'password';
}

function fakeOtp() {
  alert('OTP code: 123456 (demo)');
}

function showError(msg) {
  const el = document.getElementById('error');
  el.textContent = msg; el.style.display = 'block';
}

async function doLogin() {
  const btn = document.getElementById('login-btn');
  document.getElementById('error').style.display = 'none';

  let email, password;
  if (tab === 'email') {
    email = document.getElementById('email').value.trim();
    password = document.getElementById('password').value;
    if (!email) { showError('Please enter your email'); return; }
    if (!password) { showError('Please enter your password'); return; }
  } else {
    const phone = document.getElementById('phone').value.trim();
    if (!phone) { showError('Please enter your phone number'); return; }
    email = phone + '@phone.demo';
    password = 'demo';
  }

  btn.textContent = 'Signing in...'; btn.disabled = true;
  try {
    const res = await fetch('/auth/login', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password})});
    const data = await res.json();
    if (data.success) {
      localStorage.setItem('em_user', JSON.stringify(data.user));
      window.location.href = '/dashboard';
    }
  } catch(e) {
    showError('Something went wrong, please try again!');
    btn.textContent = 'Login'; btn.disabled = false;
  }
}

function socialLogin(provider) {
  const users = {
    facebook: {name:'Facebook User', email:'user@facebook.com', role:'User'},
    google:   {name:'Google User',   email:'user@gmail.com',    role:'User'},
  };
  localStorage.setItem('em_user', JSON.stringify(users[provider]));
  window.location.href = '/dashboard';
}

document.addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
</script>
</body>
</html>
