<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIoT Monitoring Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); max-width: 600px; margin: 15px auto; }
        .data-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; }
        .data-row:last-child { border: none; }
        .value { font-weight: bold; color: #2c3e50; }
        .ai-box { background: #e8f8f5; border-left: 5px solid #1abc9c; padding: 15px; margin-top: 20px; border-radius: 4px; }
        h1 { text-align: center; color: #34495e; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 8px; border: 1px solid #ddd; text-align: center; }
        th { background-color: #34495e; color: white; }
    </style>
</head>
<body>

<div class="card">
    <h1>Environment Monitoring</h1>
    
    <div class="data-row"><span>Temperature:</span> <span class="value" id="temp">-- °C</span></div>
    <div class="data-row"><span>Humidity:</span> <span class="value" id="hum">-- %</span></div>
    <div class="data-row"><span>Light Intensity:</span> <span class="value" id="lux">-- lux</span></div>
    <div class="data-row"><span>Soil Moisture (AO):</span> <span class="value" id="soil">--</span></div>
    <div class="data-row"><span>Rain Sensor (AO):</span> <span class="value" id="rain">--</span></div>
    
    <div class="ai-box">
        <h3>AI Analysis & Recommendations:</h3>
        <p id="ai_text" style="font-weight: bold; color: #e74c3c;">Waiting for data...</p>
        <small id="time" style="color: #7f8c8d;">Last updated: --</small>
    </div>
</div>

<div class="card">
    <h3>📊 Recent Data Logs</h3>
    <table>
        <thead>
            <tr>
                <th>Time</th>
                <th>Temp</th>
                <th>Hum</th>
                <th>Soil</th>
            </tr>
        </thead>
        <tbody id="log-table">
            </tbody>
    </table>
</div>

<script>
    let dataHistory = [];
    setInterval(function() {
        fetch('/api/latest')
            .then(response => response.json())
            .then(data => {
                // Cập nhật thông số chính
                document.getElementById('temp').innerText = data.temperature + " °C";
                document.getElementById('hum').innerText = data.humidity + " %";
                document.getElementById('lux').innerText = data.lux + " lux";
                document.getElementById('soil').innerText = data.soilAO;
                document.getElementById('rain').innerText = data.rainAO;
                document.getElementById('ai_text').innerText = data.ai_analysis;
                document.getElementById('time').innerText = "Last updated: " + data.timestamp;
                
                // Cập nhật bảng Log
                dataHistory.unshift({time: data.timestamp, temp: data.temperature, hum: data.humidity, soil: data.soilAO});
                if(dataHistory.length > 5) dataHistory.pop();
                
                let tableHtml = "";
                dataHistory.forEach(item => {
                    tableHtml += `<tr><td>${item.time.split(' ')[1]}</td><td>${item.temp}°C</td><td>${item.hum}%</td><td>${item.soil}</td></tr>`;
                });
                document.getElementById('log-table').innerHTML = tableHtml;
            });
    }, 2000);
</script>

</body>
</html>
